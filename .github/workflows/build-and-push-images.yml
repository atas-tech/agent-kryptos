name: Build And Push Images

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push-images-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  VITE_SPS_API_URL: ${{ vars.VITE_SPS_API_URL }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.vars.outputs.owner }}
      api_image: ${{ steps.vars.outputs.api_image }}
      ui_image: ${{ steps.vars.outputs.ui_image }}
    steps:
      - name: Derive image names
        id: vars
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "api_image=${{ env.REGISTRY }}/$owner/agent-kryptos-sps-server" >> "$GITHUB_OUTPUT"
          echo "ui_image=${{ env.REGISTRY }}/$owner/agent-kryptos-browser-ui" >> "$GITHUB_OUTPUT"

  build-api:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.api_image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/sps-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api-image
          cache-to: type=gha,mode=max,scope=api-image

  build-ui:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract UI image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.prepare.outputs.ui_image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/browser-ui/Dockerfile
          push: true
          build-args: |
            VITE_SPS_API_URL=${{ env.VITE_SPS_API_URL }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ui-image
          cache-to: type=gha,mode=max,scope=ui-image
